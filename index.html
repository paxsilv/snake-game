<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
    <title>Snake</title>
</head>

<body>
    <h3 id="score-display">
        <span id="score">0000</span>
        <span>High Score: <span id="high-score">0000</span></span>
    </h3>
    <div id="game-container">
        <canvas id="snake" width="648" height="378"></canvas>
    </div>
    <div id="controls">
        <p class="controls-heading">How to play</p>
        <ul class="controls-list">
            <li>Press <kbd>Enter</kbd> to start a new game</li>
            <li>Use the <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> arrow keys to move the snake</li>
        </ul>
    </div>
</body>

</html>
